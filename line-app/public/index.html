<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Login -->
  <div class="login-screen" id="loginModal">
    <div class="login-box">
      <div class="login-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <h1 class="login-title">Chat</h1>
      <p class="login-sub">名前を入力してはじめる</p>
      <input type="text" id="nameInput" class="login-input" placeholder="あなたの名前" maxlength="20" autofocus />
      <button id="startBtn" class="login-btn">はじめる</button>
    </div>
  </div>

  <div class="app" id="mainApp" style="display:none">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-brand">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span>Chat</span>
        </div>
        <div class="me-chip" id="meChip">
          <div class="me-dot"></div>
          <span id="myName">-</span>
        </div>
      </div>

      <div class="sidebar-search">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" placeholder="検索" id="searchInput" />
      </div>

      <div class="sidebar-section-label">メンバー</div>
      <ul class="contact-list" id="contactList">
        <li class="contact-empty">ユーザーを待っています...</li>
      </ul>
    </aside>

    <!-- Chat -->
    <main class="chat-area" id="chatArea">
      <div class="empty-state">
        <div class="empty-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.3">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <p>会話を選択してください</p>
      </div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
