<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idea Spark - トレンド×過去のヒットでアイデアを生む</title>
<style>
/* ============================================================
   Idea Spark - Trend × History = New Ideas
   ============================================================ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#060810;
  --bg2:#0d1020;
  --bg3:#151a30;
  --card:rgba(18,23,42,0.85);
  --card-hover:rgba(24,30,55,0.95);
  --text:#e4e8f4;
  --text2:#8891ad;
  --text3:#525a75;
  --accent:#6366f1;
  --accent2:#818cf8;
  --accent3:rgba(99,102,241,0.25);
  --cyan:#22d3ee;
  --cyan3:rgba(34,211,238,0.2);
  --green:#34d399;
  --orange:#fb923c;
  --pink:#f472b6;
  --red:#f87171;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.1);
  --r-sm:8px;--r-md:14px;--r-lg:20px;--r-xl:28px;--r-full:999px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
}

html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  line-height:1.6;min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* Ambient BG */
body::before{
  content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;
  background:
    radial-gradient(ellipse at 20% 20%,rgba(99,102,241,0.07) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 80%,rgba(34,211,238,0.04) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 50%,rgba(244,114,182,0.03) 0%,transparent 40%);
  pointer-events:none;z-index:0;
  animation:ambBG 25s ease-in-out infinite alternate;
}
@keyframes ambBG{0%{transform:translate(0,0)}100%{transform:translate(-1%,1%)}}

/* ===== Header ===== */
.header{
  position:relative;z-index:10;text-align:center;
  padding:32px 20px 20px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(99,102,241,0.06) 0%,transparent 100%);
}
.header h1{
  font-size:1.8rem;font-weight:800;letter-spacing:-0.5px;
  background:linear-gradient(135deg,var(--accent2),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header p{color:var(--text2);font-size:0.85rem;margin-top:4px}

/* Settings button */
.btn-settings{
  position:absolute;top:16px;right:16px;
  background:var(--bg3);border:1px solid var(--border2);color:var(--text2);
  font-size:1.2rem;width:38px;height:38px;border-radius:50%;
  cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;
}
.btn-settings:hover{color:var(--accent2);transform:rotate(60deg)}

/* ===== Main ===== */
.main{
  position:relative;z-index:1;max-width:800px;
  margin:0 auto;padding:24px 16px 80px;
}

/* ===== Step Indicator ===== */
.steps{
  display:flex;gap:4px;margin-bottom:24px;
  position:sticky;top:0;z-index:50;
  background:rgba(6,8,16,0.9);backdrop-filter:blur(16px);
  padding:12px 0;border-bottom:1px solid var(--border);
}
.step-dot{
  flex:1;height:4px;border-radius:2px;
  background:var(--bg3);transition:all 0.4s;
}
.step-dot.done{background:var(--accent)}
.step-dot.active{background:var(--cyan);box-shadow:0 0 12px var(--cyan3)}
.step-label{
  text-align:center;font-size:0.75rem;font-weight:600;
  color:var(--accent2);margin-bottom:8px;
  min-height:18px;
}

/* ===== Cards ===== */
.card{
  background:var(--card);backdrop-filter:blur(12px);
  border:1px solid var(--border2);border-radius:var(--r-lg);
  padding:24px;margin-bottom:16px;
  position:relative;overflow:hidden;
  animation:fadeUp 0.4s ease both;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.card-title{
  font-size:1rem;font-weight:700;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.card-title .icon{font-size:1.2rem}

/* ===== Buttons ===== */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  border:none;border-radius:var(--r-md);
  font-family:var(--font);font-weight:600;
  cursor:pointer;transition:all 0.25s;white-space:nowrap;
}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),#7c3aed);
  color:white;padding:14px 32px;font-size:1rem;
  box-shadow:0 4px 20px var(--accent3);position:relative;overflow:hidden;
}
.btn-primary::after{
  content:'';position:absolute;top:0;left:-100%;width:200%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);
  transition:left 0.5s;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(--accent3)}
.btn-primary:hover::after{left:100%}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none!important}

.btn-secondary{
  background:var(--bg3);color:var(--text);
  border:1px solid var(--border2);padding:10px 20px;font-size:0.85rem;
}
.btn-secondary:hover{background:var(--card-hover);border-color:var(--accent)}

/* ===== Start Section ===== */
.start-section{text-align:center;padding:40px 0}
.start-section h2{
  font-size:1.4rem;font-weight:800;margin-bottom:12px;
  background:linear-gradient(135deg,var(--accent2),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.start-section p{color:var(--text2);margin-bottom:24px;font-size:0.9rem;line-height:1.7}

.category-grid{
  display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:28px;
}
.cat-chip{
  cursor:pointer;padding:8px 16px;border:1.5px solid var(--border2);
  border-radius:var(--r-full);font-size:0.85rem;color:var(--text2);
  transition:all 0.2s;user-select:none;
}
.cat-chip:hover{border-color:var(--accent);color:var(--accent2)}
.cat-chip input{display:none}
.cat-chip:has(input:checked){
  background:linear-gradient(135deg,var(--accent),#7c3aed);
  border-color:transparent;color:white;
  box-shadow:0 4px 16px var(--accent3);transform:scale(1.02);
}

/* ===== Trend Cards ===== */
.trend-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;background:rgba(255,255,255,0.02);
  border:1px solid var(--border);border-radius:var(--r-md);
  margin-bottom:8px;animation:fadeUp 0.3s ease both;
}
.trend-score{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:0.75rem;font-weight:800;flex-shrink:0;
}
.trend-score.hot{background:rgba(248,113,113,0.15);color:var(--red)}
.trend-score.warm{background:rgba(251,146,60,0.15);color:var(--orange)}
.trend-score.mild{background:rgba(34,211,238,0.15);color:var(--cyan)}
.trend-info{flex:1;min-width:0}
.trend-keyword{font-weight:700;font-size:0.9rem}
.trend-desc{font-size:0.75rem;color:var(--text3);margin-top:1px}
.trend-examples{font-size:0.7rem;color:var(--accent2);margin-top:2px}

/* ===== Hit App Cards ===== */
.hit-item{
  display:flex;gap:12px;padding:14px 16px;
  background:rgba(255,255,255,0.02);border:1px solid var(--border);
  border-radius:var(--r-md);margin-bottom:8px;animation:fadeUp 0.3s ease both;
}
.hit-rank{
  font-size:1.4rem;font-weight:800;
  width:40px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.hit-rank.gold{color:#ffd700}
.hit-rank.silver{color:#c0c0c0}
.hit-rank.bronze{color:#cd7f32}
.hit-rank.normal{color:var(--text3)}
.hit-info{flex:1;min-width:0}
.hit-name{font-weight:700;font-size:0.9rem}
.hit-pattern{font-size:0.8rem;color:var(--cyan);margin-top:2px}
.hit-why{font-size:0.75rem;color:var(--text3);margin-top:2px}

/* ===== Combination Cards ===== */
.combo-card{
  background:var(--card);border:1px solid var(--border2);
  border-radius:var(--r-lg);padding:20px;margin-bottom:16px;
  position:relative;overflow:hidden;animation:fadeUp 0.5s ease both;
}
.combo-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--cyan),var(--green));
}
.combo-formula{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  margin-bottom:12px;font-size:0.8rem;
}
.combo-tag{
  padding:4px 12px;border-radius:var(--r-full);font-weight:600;font-size:0.75rem;
}
.combo-tag.trend{background:rgba(251,146,60,0.15);color:var(--orange)}
.combo-tag.hit{background:rgba(34,211,238,0.15);color:var(--cyan)}
.combo-plus{color:var(--text3);font-weight:800;font-size:1.1rem}
.combo-equals{color:var(--green);font-weight:800;font-size:1.1rem}
.combo-result{
  font-size:1.15rem;font-weight:800;margin-bottom:8px;
  background:linear-gradient(135deg,var(--accent2),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.combo-desc{color:var(--text2);font-size:0.88rem;line-height:1.6;margin-bottom:12px}
.combo-features{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.combo-feature{
  font-size:0.72rem;padding:3px 10px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:var(--r-full);color:var(--text2);
}
.combo-audience{font-size:0.78rem;color:var(--text3)}
.combo-potential{
  margin-top:12px;padding:10px 14px;
  background:rgba(52,211,153,0.06);border:1px solid rgba(52,211,153,0.15);
  border-radius:var(--r-md);
  font-size:0.82rem;color:var(--green);font-weight:600;
}
.combo-card.clickable{cursor:pointer;transition:all 0.25s}
.combo-card.clickable:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.combo-card.clickable:active{transform:scale(0.98)}
.combo-tap-hint{
  margin-top:10px;font-size:0.7rem;color:var(--text3);text-align:right;
  opacity:0.7;
}

/* ===== Deep Dive ===== */
.dive-back{
  display:inline-flex;align-items:center;gap:6px;
  background:none;border:1px solid var(--border2);color:var(--text2);
  padding:8px 16px;border-radius:var(--r-full);font-size:0.82rem;
  cursor:pointer;font-family:var(--font);margin-bottom:20px;transition:all 0.2s;
}
.dive-back:hover{border-color:var(--accent);color:var(--accent2)}

.dive-header{
  background:var(--card);border:1px solid var(--border2);border-radius:var(--r-lg);
  padding:24px;margin-bottom:16px;position:relative;overflow:hidden;
}
.dive-header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--cyan),var(--green));
}
.dive-name{
  font-size:1.3rem;font-weight:800;margin-bottom:6px;
  background:linear-gradient(135deg,var(--accent2),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.dive-desc{color:var(--text2);font-size:0.9rem;line-height:1.6}

.dive-grid{display:grid;gap:12px;margin-bottom:16px}
@media(min-width:600px){.dive-grid.two{grid-template-columns:1fr 1fr}}

.dive-card{
  background:var(--card);border:1px solid var(--border2);border-radius:var(--r-lg);
  padding:20px;animation:fadeUp 0.4s ease both;
}
.dive-card-title{
  font-size:0.88rem;font-weight:700;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.dive-card-title .ic{font-size:1.1rem}
.dive-list{list-style:none}
.dive-list li{
  padding:6px 0;font-size:0.82rem;color:var(--text2);
  border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px;
}
.dive-list li:last-child{border-bottom:none}
.dive-list li::before{content:'\2022';color:var(--accent2);font-weight:700;flex-shrink:0}

.dive-variation{
  background:rgba(255,255,255,0.02);border:1px solid var(--border);
  border-radius:var(--r-md);padding:14px;margin-bottom:8px;
  cursor:pointer;transition:all 0.2s;
}
.dive-variation:hover{border-color:var(--cyan);background:var(--card)}
.dive-variation-name{font-weight:700;font-size:0.88rem;margin-bottom:4px}
.dive-variation-desc{font-size:0.78rem;color:var(--text2)}

.dive-actions{
  display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;justify-content:center;
}

.dive-score{
  display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;
}
.dive-score-item{
  flex:1;min-width:80px;text-align:center;
  padding:12px 8px;background:rgba(255,255,255,0.02);
  border:1px solid var(--border);border-radius:var(--r-md);
}
.dive-score-val{
  font-size:1.5rem;font-weight:800;
  background:linear-gradient(135deg,var(--accent2),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.dive-score-label{font-size:0.68rem;color:var(--text3);margin-top:2px}

.breadcrumb{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  margin-bottom:16px;font-size:0.78rem;color:var(--text3);
}
.breadcrumb a{color:var(--accent2);cursor:pointer;text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
.breadcrumb .sep{color:var(--text3)}

/* ===== Human Idea Input ===== */
#secHumanIdea .field{margin-bottom:14px}
#secHumanIdea .field label{display:block;font-size:0.82rem;font-weight:600;margin-bottom:6px}
#secHumanIdea .field input{
  width:100%;padding:10px 12px;background:var(--bg3);
  border:1px solid var(--border2);border-radius:var(--r-sm);
  color:var(--text);font-size:0.88rem;font-family:var(--font);outline:none;
}
#secHumanIdea .field input:focus{border-color:var(--accent)}

/* ===== Loading ===== */
.loading{text-align:center;padding:40px 0}
.loader{
  display:inline-block;width:40px;height:40px;
  border:3px solid var(--border2);border-top-color:var(--accent);
  border-radius:50%;animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{margin-top:12px;font-size:0.85rem;color:var(--text2)}

/* ===== AI Config ===== */
.ai-bar{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;margin-bottom:16px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r-full);font-size:0.78rem;
}
.ai-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ai-dot.on{background:var(--green);box-shadow:0 0 8px rgba(52,211,153,0.4)}
.ai-dot.off{background:var(--text3)}
.ai-label{color:var(--text2);flex:1}
.ai-btn{
  background:none;border:1px solid var(--border2);color:var(--text2);
  padding:4px 12px;border-radius:var(--r-full);font-size:0.72rem;
  cursor:pointer;font-family:var(--font);
}
.ai-btn:hover{border-color:var(--accent);color:var(--accent2)}

/* ===== Modal ===== */
.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;
  display:flex;align-items:center;justify-content:center;
}
.modal[hidden]{display:none}
.modal-bg{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);
}
.modal-box{
  position:relative;background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--r-xl);width:90%;max-width:440px;max-height:80vh;
  overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--bg2);z-index:1;
}
.modal-head h2{font-size:1rem;font-weight:700}
.modal-close{
  background:none;border:none;color:var(--text3);font-size:1.4rem;
  cursor:pointer;padding:4px 8px;border-radius:var(--r-sm);
}
.modal-close:hover{color:var(--text);background:var(--bg3)}
.modal-body{padding:20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:0.82rem;font-weight:600;margin-bottom:6px}
.field input,.field select{
  width:100%;padding:10px 12px;background:var(--bg3);
  border:1px solid var(--border2);border-radius:var(--r-sm);
  color:var(--text);font-size:0.88rem;font-family:var(--font);outline:none;
}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field .hint{font-size:0.72rem;color:var(--text3);margin-top:4px}
.field .hint a{color:var(--accent2)}

/* ===== History Sidebar ===== */
.history-section{margin-top:32px}
.history-section h3{font-size:0.9rem;font-weight:700;margin-bottom:12px;color:var(--text2)}
.history-item{
  padding:10px 14px;background:rgba(255,255,255,0.02);
  border:1px solid var(--border);border-radius:var(--r-md);
  margin-bottom:6px;cursor:pointer;transition:all 0.2s;
}
.history-item:hover{border-color:var(--accent);background:var(--card)}
.history-item-name{font-weight:600;font-size:0.85rem}
.history-item-date{font-size:0.7rem;color:var(--text3);margin-top:2px}

/* ===== Section visibility ===== */
.section{display:none}
.section.active{display:block}

/* ===== Footer ===== */
.footer{
  text-align:center;padding:24px;color:var(--text3);
  font-size:0.75rem;border-top:1px solid var(--border);
}

/* ===== Responsive ===== */
@media(max-width:600px){
  .header h1{font-size:1.4rem}
  .main{padding:16px 12px 80px}
  .combo-formula{font-size:0.75rem}
}

/* ===== User Suggestions in Deep Dive ===== */
.user-suggestions{
  background:var(--card);border:1px solid var(--border2);border-radius:var(--r-lg);
  padding:20px;margin-bottom:16px;animation:fadeUp 0.4s ease both;
}
.user-suggestions .dive-card-title{margin-bottom:12px}
.suggestion-input-row{
  display:flex;gap:8px;margin-bottom:12px;
}
.suggestion-input-row input{
  flex:1;padding:10px 14px;background:var(--bg3);
  border:1px solid var(--border2);border-radius:var(--r-md);
  color:var(--text);font-size:0.88rem;font-family:var(--font);outline:none;
}
.suggestion-input-row input:focus{border-color:var(--cyan)}
.suggestion-input-row input::placeholder{color:var(--text3)}
.suggestion-add-btn{
  padding:10px 18px;background:linear-gradient(135deg,var(--cyan),#0ea5e9);
  border:none;border-radius:var(--r-md);color:white;font-weight:700;
  font-size:0.88rem;cursor:pointer;font-family:var(--font);
  white-space:nowrap;transition:all 0.2s;
}
.suggestion-add-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px var(--cyan3)}
.suggestion-add-btn:active{transform:scale(0.97)}
.suggestion-list{list-style:none;margin-bottom:8px}
.suggestion-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;margin-bottom:6px;
  background:rgba(34,211,238,0.06);border:1px solid rgba(34,211,238,0.15);
  border-radius:var(--r-md);font-size:0.84rem;color:var(--text);
  animation:fadeUp 0.3s ease both;
}
.suggestion-item .s-icon{color:var(--cyan);flex-shrink:0;font-size:1rem}
.suggestion-item .s-text{flex:1}
.suggestion-item .s-remove{
  background:none;border:none;color:var(--text3);font-size:1.1rem;
  cursor:pointer;padding:2px 6px;border-radius:4px;transition:all 0.15s;
}
.suggestion-item .s-remove:hover{color:var(--red);background:rgba(248,113,113,0.1)}
.suggestion-regen{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.25);
  border-radius:var(--r-full);color:var(--green);font-size:0.8rem;font-weight:600;
  cursor:pointer;font-family:var(--font);transition:all 0.2s;margin-top:4px;
}

  load(){ try{ return JSON.parse(localStorage.getItem(this.KEY))||{} }catch{ return {} }},

  async call(sys, usr, opts={}){

      method:'POST',
      headers:{
        'Content-Type':'application/json',

        max_tokens:opts.max||2000, temperature:opts.temp||0.85,
      })
    });
    if(!r.ok) throw new Error('API '+ r.status);
    const d = await r.json();
    return d.choices[0].message.content;
  },

${hits.map(h=>'- '+h.name+': '+h.pattern+' → '+h.why).join('\n')}

/* ============================================================
   IDEA GENERATOR (Offline Fallback)
   ============================================================ */
function pick(a){ return a[Math.floor(Math.random()*a.length)] }
function pickN(a,n){ return [...a].sort(()=>Math.random()-0.5).slice(0,n) }

function generateOfflineIdeas(cats, trends, hits){
  const ideas = [];
  const usedCombos = new Set();

  for(let i=0; i<5 && i<50; i++){
    const relTrends = trends.filter(t=>t.cats.some(c=>cats.includes(c)));
    const relHits = hits.filter(h=>h.cats.some(c=>cats.includes(c)));
    if(!relTrends.length || !relHits.length) break;

    let t,h,comboKey;
    let attempts = 0;
    do {
      t = pick(relTrends);
      h = pick(relHits);
      comboKey = t.kw+'|'+h.name;
      attempts++;
    } while(usedCombos.has(comboKey) && attempts < 30);
    usedCombos.add(comboKey);

    const names = [
      `${h.name}式${t.kw}アプリ`,
      `AI${h.name}`,
      `ネオ${h.name}+${t.kw}`,
      `${t.kw}×${h.pattern.split('×')[0]}`,
      `スマート${h.name}2.0`,
    ];

    const descs = [
      `${h.name}の成功パターン「${h.pattern}」に${t.kw}の要素を融合した新しいアプリ`,
      `${t.kw}トレンドを活かして${h.name}のような体験を再発明`,
      `${h.why}。これに${t.kw}を掛け合わせることで、さらに進化`,
    ];

    const featurePool = [
      t.kw+'機能',h.pattern.split('×')[0],
      'パーソナライズ','ソーシャルシェア','ダークモード',
      'オフライン対応','プッシュ通知','データ分析',
      'ストリーク機能','ランキング','カスタマイズ',
      'AI自動最適化','ワンタップ操作','リアルタイム同期',
    ];

    const audiencePool = [
      '20〜30代のスマホユーザー','学生','ビジネスパーソン',
      'クリエイター','健康志向の人','ゲーム好き',
      'SNSヘビーユーザー','フリーランサー','主婦/主夫',
    ];

    ideas.push({
      name: pick(names),
      trend: t.kw,
      hit: h.name,
      trendData: t,
      hitData: h,
      desc: pick(descs),
      features: pickN(featurePool, 4),
      audience: pick(audiencePool),
      potential: `${h.name}は「${h.pattern}」で成功。${t.kw}(人気度${t.hot}/10)と組み合わせれば新市場を開拓できる`,
    });
  }
  return ideas;
}

function loadHistory(){

}

  const hist = loadHistory();

const $ = id => document.getElementById(id);
let running = false;

function showSection(id){

function setStep(n, label){
  ['s1','s2','s3','s4'].forEach((id,i)=>{
    const el=$(id);
    el.className='step-dot';
    if(i<n-1) el.classList.add('done');
    if(i===n-1) el.classList.add('active');
  });
  $('stepLabel').textContent = label;
}

function updateAIStatus(){

  $('aiDot').className = 'ai-dot '+(on?'on':'off');
  $('aiLabel').textContent = on ? 'AI接続済み（'+AI.model.split('/')[1]+'）' : 'AI未接続（内蔵データで動作）';

function renderHistory(){
  const hist = loadHistory();
  const sec = $('historySection');
  const list = $('historyList');
  if(!hist.length){ sec.hidden=true; return; }
  sec.hidden=false;
  list.innerHTML='';
  hist.slice(0,5).forEach((entry,i)=>{
    const d = new Date(entry.date);
    const dateStr = d.toLocaleDateString('ja-JP')+'  '+d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
    const div = document.createElement('div');
    div.className='history-item';
    div.innerHTML=`<div class="history-item-name">${entry.ideas.map(id=>id.name).join(' / ')}</div>
      <div class="history-item-date">${dateStr} - ${entry.ideas.length}個のアイデア</div>`;
    div.onclick=()=>showPastIdeas(entry.ideas);
    list.appendChild(div);
  });
}

function showPastIdeas(ideas){

  showSection('secIdeas');

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

   MAIN PIPELINE

async function run(){
  const cats = Array.from(document.querySelectorAll('input[name="cat"]:checked')).map(c=>c.value);
  if(!cats.length){ alert('カテゴリを1つ以上選んでください'); return; }
  if(running) return;
  running = true;
  $('btnStart').disabled=true;

  // Step 1: Trend Analysis
  setStep(1,'Step 1/4: トレンドを分析中...');
  showSection('secTrends');
  const trends = TRENDS.filter(t=>t.cats.some(c=>cats.includes(c))).sort((a,b)=>b.hot-a.hot);
  await renderTrends(trends);
  await sleep(1500);

  // Step 2: Hit App Analysis
  setStep(2,'Step 2/4: 過去のヒットを分析中...');
  showSection('secHits');
  const hits = HIT_APPS.filter(h=>h.cats.some(c=>cats.includes(c)));
  await renderHits(hits);
  await sleep(1500);

  // Step 3: Combining
  setStep(3,'Step 3/4: トレンド×ヒットを掛け合わせ中...');

  let ideas;
  if(AI.on){
    setStep(3,'Step 3/4: AIがアイデアを生成中...');
    try{
      ideas = await AI.generateIdeas(cats, trends, hits);
    }catch(e){
      console.error('AI failed:', e);
      ideas = generateOfflineIdeas(cats, trends, hits);
    }
  } else {
    await sleep(1000);
    ideas = generateOfflineIdeas(cats, trends, hits);
  }

  // Step 4: Present Ideas
  setStep(4,'Step 4/4: アイデア完成！');
  showSection('secIdeas');
  renderIdeas(ideas);
  saveHistory(ideas);

  running = false;
  $('btnStart').disabled=false;
  renderHistory();
}

async function renderTrends(trends){
  const sec = $('secTrends');
  sec.innerHTML = '<div class="card"><div class="card-title"><span class="icon">&#128293;</span>今のトレンド</div><div id="trendList"></div></div>';
  const list = $('trendList');

  for(let i=0; i<Math.min(trends.length,10); i++){
    const t = trends[i];
    const div = document.createElement('div');
    div.className='trend-item';
    div.style.animationDelay = (i*0.08)+'s';
    const cls = t.hot>=9?'hot':t.hot>=7?'warm':'mild';
    div.innerHTML=`
      <div class="trend-score ${cls}">${t.hot}</div>
      <div class="trend-info">
        <div class="trend-keyword">${esc(t.kw)}</div>
        <div class="trend-desc">${esc(t.desc)}</div>
        <div class="trend-examples">${t.ex.join(' / ')}</div>
      </div>`;
    list.appendChild(div);
    await sleep(80);
  }
}

async function renderHits(hits){
  const sec = $('secHits');
  sec.innerHTML = '<div class="card"><div class="card-title"><span class="icon">&#127942;</span>過去のヒットアプリ</div><div id="hitList"></div></div>';
  const list = $('hitList');

  const sorted = [...hits].sort(()=>Math.random()-0.5).slice(0,8);
  for(let i=0; i<sorted.length; i++){
    const h = sorted[i];
    const div = document.createElement('div');
    div.className='hit-item';
    div.style.animationDelay = (i*0.08)+'s';
    const rcls = i===0?'gold':i===1?'silver':i===2?'bronze':'normal';
    div.innerHTML=`
      <div class="hit-rank ${rcls}">${i+1}</div>
      <div class="hit-info">
        <div class="hit-name">${esc(h.name)} <span style="color:var(--text3);font-weight:400;font-size:0.75rem">(${h.year})</span></div>
        <div class="hit-pattern">${esc(h.pattern)}</div>
        <div class="hit-why">${esc(h.why)}</div>
      </div>`;
    list.appendChild(div);
    await sleep(80);
  }
}

let currentIdeas = [];

      <div class="combo-formula">

        ${(idea.features||[]).map(f=>'<span class="combo-feature">'+esc(f)+'</span>').join('')}
      </div>
      <div class="combo-audience">&#127919; ターゲット: ${esc(idea.audience||'')}</div>

function goHome(){
  showSection('secStart');
  $('stepLabel').textContent='';
  ['s1','s2','s3','s4'].forEach(id=>$(id).className='step-dot');
  window.scrollTo({top:0,behavior:'smooth'});

   ============================================================ */
let diveHistory = [];

function generateOfflineDive(idea){
  const mvpFeatures = [
    'ユーザー登録/ログイン機能','メインUI画面','プッシュ通知',
    'データ保存（ローカル/クラウド）','シェア機能','設定画面',
    'オンボーディング','アナリティクス計測','課金/サブスク基盤',
    'オフライン対応','ダークモード','多言語対応',
  ];
  const competitors = [
    {name:'既存大手アプリ',strength:'ブランド力とユーザー基盤',weakness:'革新性の欠如'},
    {name:'新興スタートアップ',strength:'スピードと柔軟性',weakness:'資金とリソース不足'},
    {name:'個人開発アプリ',strength:'ニッチ対応力',weakness:'スケーラビリティ'},
  ];
  const revenueModels = [
    {model:'フリーミアム',desc:'基本無料＋プレミアム機能を月額制で提供'},
    {model:'広告収入',desc:'ユーザーに無料提供し、広告で収益化'},
    {model:'サブスクリプション',desc:'月額/年額で全機能アクセス'},
    {model:'アプリ内課金',desc:'デジタルアイテムや追加コンテンツの販売'},
  ];
  const risks = [
    {risk:'ユーザー獲得コスト',level:'中',mitigation:'SNSバイラルとASO最適化で有機成長を狙う'},
    {risk:'競合の参入',level:'高',mitigation:'独自のUXとコミュニティで差別化'},
    {risk:'技術的な複雑さ',level:'低',mitigation:'MVPは既存技術スタックで構築可能'},
    {risk:'収益化の難しさ',level:'中',mitigation:'複数の収益モデルを段階的にテスト'},
  ];
  const variations = [
    {name:idea.name+' Lite',desc:'コア機能のみに絞った軽量版。広告モデルで無料提供'},
    {name:idea.name+' Pro',desc:'AIパーソナライズとプレミアム機能を搭載したプロ版'},
    {name:idea.name+' Social',desc:'コミュニティ機能を中心にしたソーシャル特化版'},
  ];

  return {
    mvp: pickN(mvpFeatures, 6),
    competitors: pickN(competitors, 2),
    revenue: pickN(revenueModels, 2),
    risks: pickN(risks, 3),
    variations,
    scores: {
      novelty: 5 + Math.floor(Math.random()*5),
      feasibility: 4 + Math.floor(Math.random()*6),
      market: 4 + Math.floor(Math.random()*6),
      monetization: 3 + Math.floor(Math.random()*6),
    }
  };
}

async function deepDive(idea){
  diveHistory.push({ideas: currentIdeas, label: $('stepLabel').textContent});
  setStep(4, '深掘り分析中: '+idea.name);

  const sec = $('secDeepDive');
  sec.innerHTML = '<div class="loading"><div class="loader"></div><div class="loading-text">「'+esc(idea.name)+'」を深掘り分析中...</div></div>';
  showSection('secDeepDive');

  let dive;
  if(AI.on){
    try{ dive = await aiDeepDive(idea); }
    catch(e){ console.error('AI dive failed:', e); dive = generateOfflineDive(idea); }
  } else {
    await sleep(800);
    dive = generateOfflineDive(idea);
  }

  renderDeepDive(idea, dive);
}

async function aiDeepDive(idea){
  const sys = `あなたはアプリ企画の専門家です。提示されたアプリアイデアを深掘り分析してください。
必ず以下のJSON形式だけを返してください:
{"mvp":["MVP機能1","MVP機能2",...],"competitors":[{"name":"競合名","strength":"強み","weakness":"弱み"}],"revenue":[{"model":"収益モデル名","desc":"説明"}],"risks":[{"risk":"リスク","level":"高/中/低","mitigation":"対策"}],"variations":[{"name":"バリエーション名","desc":"説明"}],"scores":{"novelty":8,"feasibility":7,"market":6,"monetization":7}}
scoresは1-10で評価。`;

  const usr = `【アプリ名】${idea.name}
【説明】${idea.desc}
【トレンド】${idea.trend||''}
【参考ヒット】${idea.hit||''}
【特徴】${(idea.features||[]).join(', ')}
【ターゲット】${idea.audience||''}

このアイデアを深掘りしてください。MVP機能6つ、競合2つ、収益モデル2つ、リスク3つ、バリエーション3つを提案してください。`;

  const raw = await AI.call(sys, usr, {temp:0.8, max:2000});
  const m = raw.match(/\{[\s\S]*\}/);
  if(!m) throw new Error('JSON parse failed');
  return JSON.parse(m[0]);
}

function renderDeepDive(idea, dive){
  const sec = $('secDeepDive');
  const trend = idea.trend || idea.trendData?.kw || '';
  const hit = idea.hit || idea.hitData?.name || '';

  sec.innerHTML = `
    <div class="breadcrumb">
      <a onclick="goBackFromDive()">&#128161; アイデア一覧</a>
      <span class="sep">&#8250;</span>
      <span>${esc(idea.name)}</span>
    </div>
    <button class="dive-back" onclick="goBackFromDive()">&#8592; アイデア一覧に戻る</button>

    <div class="dive-header">
      <div class="combo-formula" style="margin-bottom:10px">
        ${trend ? '<span class="combo-tag trend">'+esc(trend)+'</span><span class="combo-plus">&times;</span>' : ''}
        ${hit ? '<span class="combo-tag hit">'+esc(hit)+'</span><span class="combo-equals">=</span>' : ''}
      </div>
      <div class="dive-name">${esc(idea.name)}</div>
      <div class="dive-desc">${esc(idea.desc)}</div>
      ${idea.audience ? '<div style="margin-top:8px;font-size:0.82rem;color:var(--text3)">&#127919; '+esc(idea.audience)+'</div>' : ''}
      <div class="dive-score">
        <div class="dive-score-item"><div class="dive-score-val">${dive.scores.novelty}</div><div class="dive-score-label">新規性</div></div>
        <div class="dive-score-item"><div class="dive-score-val">${dive.scores.feasibility}</div><div class="dive-score-label">実現性</div></div>
        <div class="dive-score-item"><div class="dive-score-val">${dive.scores.market}</div><div class="dive-score-label">市場性</div></div>
        <div class="dive-score-item"><div class="dive-score-val">${dive.scores.monetization}</div><div class="dive-score-label">収益性</div></div>
      </div>
    </div>

    <div class="dive-grid two">
      <div class="dive-card">
        <div class="dive-card-title"><span class="ic">&#128736;</span>MVP機能</div>
        <ul class="dive-list">${(dive.mvp||[]).map(f=>'<li>'+esc(f)+'</li>').join('')}</ul>
      </div>
      <div class="dive-card">
        <div class="dive-card-title"><span class="ic">&#128176;</span>収益モデル</div>
        <ul class="dive-list">${(dive.revenue||[]).map(r=>'<li><strong>'+esc(r.model)+'</strong><br>'+esc(r.desc)+'</li>').join('')}</ul>
      </div>
    </div>

    <div class="dive-grid two">
      <div class="dive-card">
        <div class="dive-card-title"><span class="ic">&#9878;</span>競合分析</div>
        <ul class="dive-list">${(dive.competitors||[]).map(c=>'<li><strong>'+esc(c.name)+'</strong><br>強み: '+esc(c.strength)+'<br>弱み: '+esc(c.weakness)+'</li>').join('')}</ul>
      </div>
      <div class="dive-card">
        <div class="dive-card-title"><span class="ic">&#9888;</span>リスク分析</div>
        <ul class="dive-list">${(dive.risks||[]).map(r=>'<li><strong>['+esc(r.level)+'] '+esc(r.risk)+'</strong><br>対策: '+esc(r.mitigation)+'</li>').join('')}</ul>
      </div>
    </div>

    <div class="dive-card">
      <div class="dive-card-title"><span class="ic">&#128300;</span>バリエーション（クリックで深掘り）</div>
      <div id="diveVariations"></div>
    </div>

    <div class="user-suggestions" id="userSuggestions">
      <div class="dive-card-title"><span class="ic">&#128172;</span>あなたのアイデアを追加</div>
      <div class="suggestion-input-row">
        <input type="text" id="suggestionInput" placeholder="こうしたらもっと良くなるかも...">
        <button class="suggestion-add-btn" id="btnAddSuggestion">追加</button>
      </div>
      <ul class="suggestion-list" id="suggestionList"></ul>
      <div class="suggestion-empty" id="suggestionEmpty">あなたの視点でアイデアをもっと良くしましょう</div>
    </div>

    <div class="dive-actions">
      <button class="btn btn-secondary" onclick="goBackFromDive()">&#8592; 戻る</button>
      <button class="btn btn-primary" onclick="goHome()"><span>&#128260;</span> 最初から</button>
    </div>
  `;

  // Render clickable variations
  const varContainer = sec.querySelector('#diveVariations');
  (dive.variations||[]).forEach(v => {
    const vDiv = document.createElement('div');
    vDiv.className = 'dive-variation';
    vDiv.innerHTML = '<div class="dive-variation-name">'+esc(v.name)+'</div><div class="dive-variation-desc">'+esc(v.desc)+'</div>';
    vDiv.addEventListener('click', () => {
      deepDive({name:v.name, desc:v.desc, trend:idea.trend, hit:idea.hit, features:[], audience:idea.audience||'', potential:''});
    });
    varContainer.appendChild(vDiv);
  });

  // User suggestions
  const suggestions = [];
  const sugInput = sec.querySelector('#suggestionInput');
  const sugList = sec.querySelector('#suggestionList');
  const sugEmpty = sec.querySelector('#suggestionEmpty');
  const btnAdd = sec.querySelector('#btnAddSuggestion');

  function addSuggestion(){
    const text = sugInput.value.trim();
    if(!text) return;
    suggestions.push(text);
    sugInput.value = '';
    renderSuggestions();
    sugInput.focus();
  }

  function removeSuggestion(i){
    suggestions.splice(i, 1);
    renderSuggestions();
  }

  function renderSuggestions(){
    sugList.innerHTML = '';
    sugEmpty.style.display = suggestions.length ? 'none' : 'block';
    // Remove old regen button
    const oldRegen = sec.querySelector('.suggestion-regen');
    if(oldRegen) oldRegen.remove();

    suggestions.forEach((s, i) => {
      const li = document.createElement('li');
      li.className = 'suggestion-item';
      li.innerHTML = '<span class="s-icon">&#128161;</span><span class="s-text">'+esc(s)+'</span>';
      const removeBtn = document.createElement('button');
      removeBtn.className = 's-remove';
      removeBtn.innerHTML = '&times;';
      removeBtn.addEventListener('click', () => removeSuggestion(i));
      li.appendChild(removeBtn);
      sugList.appendChild(li);
    });

    // Show re-analyze button if AI is on and there are suggestions
    if(suggestions.length > 0 && AI.on){
      const regen = document.createElement('button');
      regen.className = 'suggestion-regen';
      regen.innerHTML = '&#9889; AIで提案を反映して再分析';
      regen.addEventListener('click', () => reAnalyzeWithSuggestions(idea, suggestions));
      sec.querySelector('#userSuggestions').appendChild(regen);
    }

    // Also update the idea object with user suggestions for later use
    idea.userSuggestions = [...suggestions];
  }

  btnAdd.addEventListener('click', addSuggestion);
  sugInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') addSuggestion();
  });

  // Restore previous suggestions if any
  if(idea.userSuggestions && idea.userSuggestions.length){
    idea.userSuggestions.forEach(s => suggestions.push(s));
    renderSuggestions();
  }
}

async function reAnalyzeWithSuggestions(idea, suggestions){
  const sec = $('secDeepDive');
  sec.innerHTML = '<div class="loading"><div class="loader"></div><div class="loading-text">ユーザーの提案を反映して再分析中...</div></div>';

  const sys = `あなたはアプリ企画の専門家です。ユーザーの改善提案を取り入れて、アプリアイデアを再分析してください。
必ず以下のJSON形式だけを返してください:
{"mvp":["MVP機能1","MVP機能2",...],"competitors":[{"name":"競合名","strength":"強み","weakness":"弱み"}],"revenue":[{"model":"収益モデル名","desc":"説明"}],"risks":[{"risk":"リスク","level":"高/中/低","mitigation":"対策"}],"variations":[{"name":"バリエーション名","desc":"説明"}],"scores":{"novelty":8,"feasibility":7,"market":6,"monetization":7}}
scoresは1-10で評価。ユーザーの提案を踏まえて内容を改善してください。`;

  const usr = `【アプリ名】${idea.name}
【説明】${idea.desc}
【トレンド】${idea.trend||''}
【参考ヒット】${idea.hit||''}
【特徴】${(idea.features||[]).join(', ')}
【ターゲット】${idea.audience||''}

【ユーザーからの改善提案】
${suggestions.map((s,i)=>(i+1)+'. '+s).join('\n')}

上記のユーザー提案を積極的に取り入れて、深掘り分析を改善してください。MVP機能6つ、競合2つ、収益モデル2つ、リスク3つ、バリエーション3つを提案してください。`;

  try {
    const raw = await AI.call(sys, usr, {temp:0.8, max:2000});
    const m = raw.match(/\{[\s\S]*\}/);
    if(!m) throw new Error('JSON parse failed');
    const dive = JSON.parse(m[0]);
    renderDeepDive(idea, dive);
  } catch(e) {
    console.error('Re-analysis failed:', e);
    // Fallback: just re-render with offline + keep suggestions
    const dive = generateOfflineDive(idea);
    renderDeepDive(idea, dive);
  }
}

function goBackFromDive(){
  if(diveHistory.length > 0){
    const prev = diveHistory.pop();
    setStep(4, prev.label || 'アイデア完成！');
    renderIdeas(prev.ideas);
    showSection('secIdeas');
  } else {
    goHome();
  }
}

/* ============================================================
   HUMAN IDEA
   ============================================================ */
function buildHumanIdea(){
  const name = $('humanName').value.trim();
  const desc = $('humanDesc').value.trim();
  if(!name){ alert('アプリ名を入力してください'); return null; }
  const features = $('humanFeatures').value.trim() ? $('humanFeatures').value.split(/[,、]/).map(s=>s.trim()).filter(Boolean) : [];
  const audience = $('humanAudience').value.trim() || '';
  return {
    name, desc: desc||name,
    trend:'人間のアイデア', hit:'オリジナル',
    features, audience, potential:'ユーザー発のオリジナルアイデア',
    isHuman: true
  };
}

function addHumanIdea(){
  const idea = buildHumanIdea();
  if(!idea) return;
  currentIdeas.push(idea);
  setStep(4,'アイデア完成！');
  renderIdeas(currentIdeas);
  showSection('secIdeas');
  clearHumanForm();
}

function diveHumanIdea(){
  const idea = buildHumanIdea();
  if(!idea) return;
  currentIdeas = [idea];
  diveHistory = [{ideas:[idea], label:'自分のアイデア'}];
  setStep(4,'深掘り分析中: '+idea.name);
  clearHumanForm();
  deepDive(idea);
}

function clearHumanForm(){
  $('humanName').value='';
  $('humanDesc').value='';
  $('humanFeatures').value='';
  $('humanAudience').value='';
}

function esc(s){
  if(!s) return '';
  const d=document.createElement('div');d.textContent=s;return d.innerHTML;
}
