<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LINE Clone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ════════════════════════════════
     SCREEN: TALK LIST
════════════════════════════════ -->
<div id="screen-list" class="screen active">

  <!-- Header -->
  <header class="list-header">
    <div class="list-header-left">
      <span class="list-title">トーク</span>
      <svg class="icon-caret" viewBox="0 0 10 7"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
    </div>
    <div class="list-header-right">
      <button class="icon-btn" title="AI">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/><path d="M8 12c0-2.2 1.8-4 4-4s4 1.8 4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="15" r="1" fill="currentColor"/></svg>
        <span class="dot dot-green"></span>
      </button>
      <button class="icon-btn" title="検索">
        <svg viewBox="0 0 24 24" fill="none"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button class="icon-btn" title="追加">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </header>

  <!-- Search bar -->
  <div class="search-bar-wrap">
    <div class="search-bar">
      <svg class="search-icon" viewBox="0 0 20 20" fill="none"><path d="M17 17l-3.5-3.5M14 8.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z" stroke="#888" stroke-width="1.6" stroke-linecap="round"/></svg>
      <span class="search-placeholder">検索</span>
      <svg class="scan-icon" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1" stroke="#888" stroke-width="1.6"/><rect x="14" y="3" width="7" height="7" rx="1" stroke="#888" stroke-width="1.6"/><rect x="3" y="14" width="7" height="7" rx="1" stroke="#888" stroke-width="1.6"/><rect x="14" y="14" width="4" height="2" rx=".5" stroke="#888" stroke-width="1.6"/><rect x="18" y="16" width="3" height="5" rx=".5" stroke="#888" stroke-width="1.6"/></svg>
    </div>
  </div>

  <!-- Chat list -->
  <div class="chat-list" id="chat-list"></div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <button class="nav-btn" onclick="switchNav('home')">
      <svg viewBox="0 0 24 24" fill="none"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z" stroke="currentColor" stroke-width="1.8"/><path d="M9 21V12h6v9" stroke="currentColor" stroke-width="1.8"/></svg>
      <span class="dot dot-red"></span>
      <label>ホーム</label>
    </button>
    <button class="nav-btn active" onclick="switchNav('talk')">
      <svg viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10z" stroke="currentColor" stroke-width="1.8"/></svg>
      <label>トーク</label>
    </button>
    <button class="nav-btn" onclick="switchNav('voom')">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/><polygon points="10,8 16,12 10,16" fill="currentColor"/></svg>
      <span class="dot dot-red"></span>
      <label>VOOM</label>
    </button>
    <button class="nav-btn" onclick="switchNav('news')">
      <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 9h8M8 13h5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      <span class="dot dot-red"></span>
      <label>ニュース</label>
    </button>
    <button class="nav-btn" onclick="switchNav('mini')">
      <svg viewBox="0 0 24 24" fill="none"><rect x="5" y="3" width="14" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="16" r="1.5" fill="currentColor"/></svg>
      <span class="dot dot-red"></span>
      <label>MINI</label>
    </button>
  </nav>
</div>

<!-- ════════════════════════════════
     SCREEN: CHAT VIEW
════════════════════════════════ -->
<div id="screen-chat" class="screen slide-right">

  <!-- Chat Header -->
  <header class="chat-header">
    <button class="chat-back" onclick="closeChat()">
      <svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="chat-header-name" id="chat-header-name">-</div>
    <div class="chat-header-icons">
      <button class="icon-btn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button class="icon-btn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 11.39 18a19.5 19.5 0 0 1-4.95-4.95A19.79 19.79 0 0 1 3.08 4.18 2 2 0 0 1 5.07 2h3a2 2 0 0 1 2 1.72c.127.96.36 1.903.7 2.81a2 2 0 0 1-.45 2.11L9.09 9.91a16 16 0 0 0 5 5l1.27-1.27a2 2 0 0 1 2.11-.45c.907.34 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" stroke="currentColor" stroke-width="1.8"/></svg>
      </button>
      <button class="icon-btn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </header>

  <!-- Messages area -->
  <div class="messages-area" id="messages-area"></div>

  <!-- Input bar -->
  <div class="input-bar">
    <button class="input-icon-btn">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#666" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <button class="input-icon-btn">
      <svg viewBox="0 0 24 24" fill="none"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" stroke="#666" stroke-width="1.8"/><circle cx="12" cy="13" r="4" stroke="#666" stroke-width="1.8"/></svg>
    </button>
    <button class="input-icon-btn">
      <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="#666" stroke-width="1.8"/><path d="M3 9h18" stroke="#666" stroke-width="1.4"/><path d="M9 3v6" stroke="#666" stroke-width="1.4"/></svg>
    </button>
    <div class="input-text-wrap">
      <div class="input-text" id="input-text" contenteditable="true" data-placeholder="Aa"></div>
    </div>
    <button class="input-icon-btn ai-btn">
      <span>AI</span>
    </button>
    <button class="input-icon-btn">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#666" stroke-width="1.8"/><path d="M8 13s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01" stroke="#666" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
    <button class="input-icon-btn" id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 19V5M5 12l7-7 7 7" stroke="#06C755" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
