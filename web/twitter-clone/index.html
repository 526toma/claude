<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Twitter Clone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen" class="screen active">
  <div class="auth-container">
    <div class="auth-logo">🐦</div>
    <h1 class="auth-title">Twitter Clone</h1>

    <div id="login-form" class="auth-form">
      <h2>ログイン</h2>
      <input type="email" id="login-email" placeholder="メールアドレス" />
      <input type="password" id="login-password" placeholder="パスワード" />
      <button class="btn-primary" onclick="loginUser()">ログイン</button>
      <p class="auth-switch">アカウントがない方は <a href="#" onclick="showRegister()">新規登録</a></p>
    </div>

    <div id="register-form" class="auth-form hidden">
      <h2>新規登録</h2>
      <input type="text" id="reg-name" placeholder="表示名" />
      <input type="text" id="reg-username" placeholder="ユーザー名 (例: john)" />
      <input type="email" id="reg-email" placeholder="メールアドレス" />
      <input type="password" id="reg-password" placeholder="パスワード（6文字以上）" />
      <button class="btn-primary" onclick="registerUser()">登録する</button>
      <p class="auth-switch">すでにアカウントをお持ちの方は <a href="#" onclick="showLogin()">ログイン</a></p>
    </div>

    <div id="auth-error" class="error-msg hidden"></div>
  </div>
</div>

<!-- Main App Screen -->
<div id="app-screen" class="screen hidden">

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <span class="header-title" id="header-title">ホーム</span>
      <div class="header-avatar" id="header-avatar" onclick="toggleProfileMenu()">?</div>
    </div>
  </header>

  <!-- Content Area -->
  <main class="main-content">

    <!-- Home Tab -->
    <div id="tab-home" class="tab-content active">
      <!-- Tweet Compose -->
      <div class="compose-box">
        <div class="compose-avatar" id="compose-avatar">?</div>
        <div class="compose-right">
          <textarea id="tweet-input" placeholder="いまどうしてる？" maxlength="280"></textarea>
          <div class="compose-footer">
            <span class="char-count" id="char-count">280</span>
            <button class="btn-tweet" onclick="postTweet()">ツイートする</button>
          </div>
        </div>
      </div>
      <div class="divider"></div>
      <!-- Feed -->
      <div id="feed" class="feed"></div>
    </div>

    <!-- Search Tab -->
    <div id="tab-search" class="tab-content hidden">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="ユーザーを検索..." oninput="searchUsers()" />
      </div>
      <div id="search-results"></div>
    </div>

    <!-- Notifications Tab -->
    <div id="tab-notifications" class="tab-content hidden">
      <div id="notifications-list" class="feed">
        <div class="empty-state">通知はありません</div>
      </div>
    </div>

    <!-- Profile Tab -->
    <div id="tab-profile" class="tab-content hidden">
      <div class="profile-header">
        <div class="profile-banner"></div>
        <div class="profile-info">
          <div class="profile-avatar-large" id="profile-avatar-large">?</div>
          <div class="profile-meta">
            <div class="profile-name" id="profile-display-name">-</div>
            <div class="profile-username" id="profile-username-display">@-</div>
            <div class="profile-joined" id="profile-joined">-</div>
          </div>
          <div class="profile-stats">
            <div class="stat"><span id="profile-tweet-count">0</span><small>ツイート</small></div>
            <div class="stat"><span id="profile-following-count">0</span><small>フォロー中</small></div>
            <div class="stat"><span id="profile-followers-count">0</span><small>フォロワー</small></div>
          </div>
          <button class="btn-outline" onclick="logoutUser()">ログアウト</button>
        </div>
      </div>
      <div class="divider"></div>
      <div id="profile-tweets" class="feed"></div>
    </div>

    <!-- User Profile View -->
    <div id="tab-user-profile" class="tab-content hidden">
      <div class="back-bar">
        <button class="btn-back" onclick="goBack()">← 戻る</button>
      </div>
      <div class="profile-header">
        <div class="profile-banner"></div>
        <div class="profile-info">
          <div class="profile-avatar-large" id="user-avatar-large">?</div>
          <div class="profile-meta">
            <div class="profile-name" id="user-display-name">-</div>
            <div class="profile-username" id="user-username-display">@-</div>
          </div>
          <div class="profile-stats">
            <div class="stat"><span id="user-tweet-count">0</span><small>ツイート</small></div>
            <div class="stat"><span id="user-following-count">0</span><small>フォロー中</small></div>
            <div class="stat"><span id="user-followers-count">0</span><small>フォロワー</small></div>
          </div>
          <button class="btn-follow" id="follow-btn" onclick="toggleFollow()">フォローする</button>
        </div>
      </div>
      <div class="divider"></div>
      <div id="user-profile-tweets" class="feed"></div>
    </div>

  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('home')" id="nav-home">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>ホーム</span>
    </button>
    <button class="nav-item" onclick="switchTab('search')" id="nav-search">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <span>検索</span>
    </button>
    <button class="nav-item" onclick="switchTab('notifications')" id="nav-notifications">
      <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      <span>通知</span>
    </button>
    <button class="nav-item" onclick="switchTab('profile')" id="nav-profile">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span>プロフィール</span>
    </button>
  </nav>

</div>

<!-- Profile Menu -->
<div id="profile-menu" class="profile-menu hidden" onclick="closeProfileMenu()">
  <div class="profile-menu-card" onclick="event.stopPropagation()">
    <div class="profile-menu-avatar" id="menu-avatar">?</div>
    <div class="profile-menu-name" id="menu-name">-</div>
    <div class="profile-menu-username" id="menu-username">@-</div>
    <button class="profile-menu-logout" onclick="logoutUser()">ログアウト</button>
  </div>
</div>

<!-- User Card Modal -->
<div id="user-card-modal" class="user-card-modal hidden" onclick="closeUserCard()">
  <div class="user-card-popup" onclick="event.stopPropagation()">
    <div class="user-card-popup-avatar" id="ucard-avatar">?</div>
    <div class="user-card-popup-name" id="ucard-name">-</div>
    <div class="user-card-popup-username" id="ucard-username">@-</div>
    <div class="user-card-popup-stats">
      <div class="stat"><span id="ucard-tweets">0</span><small>ツイート</small></div>
      <div class="stat"><span id="ucard-following">0</span><small>フォロー</small></div>
      <div class="stat"><span id="ucard-followers">0</span><small>フォロワー</small></div>
    </div>
    <button class="btn-follow" id="ucard-follow-btn" onclick="toggleFollowFromCard()">フォローする</button>
    <button class="btn-outline" id="ucard-profile-btn" onclick="goToUserProfile()">プロフィールを見る</button>
  </div>
</div>

<!-- Comment Modal -->
<div id="comment-modal" class="comment-modal hidden" onclick="closeComments()">
  <div class="comment-sheet" onclick="event.stopPropagation()">
    <div class="comment-sheet-header">
      <button class="btn-back" onclick="closeComments()">← 閉じる</button>
      <span>コメント</span>
    </div>
    <div id="comment-list" class="comment-list"></div>
    <div class="comment-input-bar">
      <div class="tweet-avatar" id="comment-avatar" style="width:32px;height:32px;font-size:13px;flex-shrink:0">?</div>
      <input type="text" id="comment-input" placeholder="コメントを入力..." maxlength="280" onkeydown="if(event.key==='Enter')postComment()" />
      <button class="btn-tweet" id="comment-submit" onclick="postComment()">送信</button>
    </div>
  </div>
</div>

<!-- Loading Overlay -->
<div id="loading" class="loading-overlay hidden">
  <div class="spinner"></div>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script type="module" src="app.js"></script>
</body>
</html>
